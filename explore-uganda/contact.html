<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>

  <title>Contact / Review Form</title>
</head>

<body>

<header>
  <h1>Travel Review Form</h1>
</header>

<!-- FORM (ONLY REQUIRED FIX) -->
<form method="get" action="review.html">

  <!-- SELECT -->
  <label for="destination">Choose Destination</label>
  <select id="destination" name="destination" required>
    <option value="">-- Select Destination --</option>
    <option value="murchison">Murchison Falls</option>
    <option value="bwindi">Bwindi Forest</option>
    <option value="lake">Lake Victoria</option>
  </select>

  <!-- DATE -->
  <label for="visitDate">Visit Date</label>
  <input type="date" id="visitDate" name="visitDate" required>

  <!-- RADIO -->
  <p>Rate Your Experience</p>

  <label><input type="radio" name="rating" value="1" required> 1</label>
  <label><input type="radio" name="rating" value="2"> 2</label>
  <label><input type="radio" name="rating" value="3"> 3</label>
  <label><input type="radio" name="rating" value="4"> 4</label>
  <label><input type="radio" name="rating" value="5"> 5</label>

  <!-- CHECKBOX -->
  <p>What did you enjoy?</p>

  <label><input type="checkbox" name="enjoy" value="wildlife"> Wildlife</label>
  <label><input type="checkbox" name="enjoy" value="culture"> Culture</label>
  <label><input type="checkbox" name="enjoy" value="food"> Food</label>
  <label><input type="checkbox" name="enjoy" value="scenery"> Scenery</label>

  <!-- TEXTAREA -->
  <label for="comment">Your Review</label>
  <textarea id="comment" name="comment" rows="5" required></textarea>

  <!-- SUBMIT -->
  <button type="submit">Submit Review</button>
</form></body>
</html>
