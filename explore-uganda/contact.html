<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>

  <title>Contact / Review Form</title>
</head>

<body>

<header>
  <h1>Travel Review Form</h1>
</header>

<!--  ADDED MAIN -->
<main>

<form method="get" action="review.html">

  <!-- SELECT -->
  <label for="destination">Choose Destination *</label>
  <select id="destination" name="destination" required>
    <!--  FIXED PLACEHOLDER -->
    <option value="" disabled selected>-- Select Destination --</option>
    <option value="murchison">Murchison Falls</option>
    <option value="bwindi">Bwindi Forest</option>
    <option value="lake">Lake Victoria</option>
  </select>

  <!-- DATE -->
  <label for="visitDate">Visit Date *</label>
  <input type="date" id="visitDate" name="visitDate" required>

  <!-- RADIO -->
  <fieldset>
    <legend>Rate Your Experience *</legend>

    <label><input type="radio" name="rating" value="1" required> 1</label>
    <label><input type="radio" name="rating" value="2" required> 2</label>
    <label><input type="radio" name="rating" value="3" required> 3</label>
    <label><input type="radio" name="rating" value="4" required> 4</label>
    <label><input type="radio" name="rating" value="5" required> 5</label>
  </fieldset>

  <!-- CHECKBOX -->
  <fieldset>
    <legend>What did you enjoy?</legend>

    <label><input type="checkbox" name="enjoy" value="wildlife" required> Wildlife</label>
    <label><input type="checkbox" name="enjoy" value="culture" required> Culture</label>
    <label><input type="checkbox" name="enjoy" value="food" required> Food</label>
    <label><input type="checkbox" name="enjoy" value="scenery"> Scenery</label>
    <fieldset>
      <legend>Features</legend>

      <input type="checkbox" id="c1" name="feature">
      <label for="c1">Feature 1</label>

      <input type="checkbox" id="c2" name="feature">
      <label for="c2">Feature 2</label>

      <input type="checkbox" id="c3" name="feature">
      <label for="c3">Feature 3</label>

      <input type="checkbox" id="c4" name="feature">
      <label for="c4">Feature 4</label>
    </fieldset>

    <!-- TEXTAREA -->
  <label for="comment">Your Review</label>
  <textarea id="comment" name="comment" rows="5"></textarea>

  <!-- SUBMIT -->
  <button type="submit">Submit Review</button></form>
 </main>
 </body>
 </html>
