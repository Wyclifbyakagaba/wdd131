<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <script src="js/script.js" defer></script>

  <title>Review Submitted</title>
</head>

<body>

<header>
  <h1>Thank You!</h1>
</header>
<main>
  <form method="get" action="review.html">

    <!-- Product -->
    <label for="product">Product name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- Rating -->
    <fieldset>
      <legend>Overall Rating *</legend>

      <div class="star-rating">
        <input type="radio" id="rating1" name="rating" value="1" required>
        <label for="rating1">☆</label>

        <input type="radio" id="rating2" name="rating" value="2" required>
        <label for="rating2">☆</label>

        <input type="radio" id="rating3" name="rating" value="3" required>
        <label for="rating3">☆</label>

        <input type="radio" id="rating4" name="rating" value="4" required>
        <label for="rating4">☆</label>

        <input type="radio" id="rating5" name="rating" value="5" required>
        <label for="rating5">☆</label>
      </div>
    </fieldset>

    <!-- Date -->
    <label for="date">Date of Installation *</label>
    <input type="date" id="date" name="date" required>

    <!-- Features -->
    <fieldset>
      <legend>Useful Features</legend>

      <input type="checkbox" id="feature1" name="feature" value="Feature 1">
      <label for="feature1">Feature 1</label>

      <input type="checkbox" id="feature2" name="feature" value="Feature 2">
      <label for="feature2">Feature 2</label>

      <input type="checkbox" id="feature3" name="feature" value="Feature 3">
      <label for="feature3">Feature 3</label>

      <input type="checkbox" id="feature4" name="feature" value="Feature 4">
      <label for="feature4">Feature 4</label>
    </fieldset>

    <!-- Review -->
    <label for="review">Written Review</label>
    <textarea id="review" name="review"></textarea>

    <!-- Name -->
    <label for="user">Your name</label>
    <input type="text" id="user" name="user">

    <!-- Submit -->
    <input type="submit" value="Submit Review">

  </form>
</main>
