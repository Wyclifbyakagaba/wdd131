<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Website planning document for Explore Uganda tourism site">
  <title>Site Plan - Explore Uganda</title>

  <!-- Google Fonts preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">
  <!-- External JS -->
<script src="scripts.js"></script>
</head>

<body>

<header>
  <h1>Explore Uganda - Site Plan</h1>
</header>

<main>

<!-- Form for review -->
<form method="get" action="review.html">

  <!-- Select Example -->
  <label for="region">Choose a region:</label>
  <select id="region" name="region">
    <option value="" disabled selected>Select a region</option>
    <option value="central">Central Uganda</option>
    <option value="east">Eastern Uganda</option>
    <option value="north">Northern Uganda</option>
    <option value="west">Western Uganda</option>
  </select>

  <!-- Radio buttons example -->
  <p>Best type of tour:</p>
  <label><input type="radio" name="tourType" value="safari"> Safari</label>
  <label><input type="radio" name="tourType" value="cultural"> Cultural</label>
  <label><input type="radio" name="tourType" value="adventure"> Adventure</label>
  <label><input type="radio" name="tourType" value="nature"> Nature</label>
  <label><input type="radio" name="tourType" value="historic"> Historic</label>

  <!-- Date Input -->
  <label for="visitDate">Planned Visit Date:</label>
  <input type="date" id="visitDate" name="visitDate">

  <!-- Checkbox Inputs -->
  <p>Activities you are interested in:</p>
  <label><input type="checkbox" name="activities" value="hiking"> Hiking</label>
  <label><input type="checkbox" name="activities" value="boating"> Boating</label>
  <label><input type="checkbox" name="activities" value="safari"> Safari</label>
  <label><input type="checkbox" name="activities" value="culturalTours"> Cultural Tours</label>

  <!-- Textarea -->
  <label for="notes">Additional Notes:</label>
  <textarea id="notes" name="notes" rows="4" cols="50" placeholder="Any special requests?"></textarea>

  <!-- Submit Button -->
  <button type="submit">Submit</button>

</form>

</main>

<footer>
  <p>© 2026 | Explore Uganda | Byakagaba Wycliff</p>
</footer>


</body>
</html>
