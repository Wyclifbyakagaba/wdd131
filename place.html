<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Kampala, Uganda</title>
  <meta name="author" content="wycliff Byakagaba">
  <link rel="stylesheet" href="css/place.css">
  <script src="js/place.js" defer></script>
</head>

<body>

<header>
  <h1>Kampala, Uganda</h1>
</header>

<main>

  <!-- HERO IMAGE (Responsive WebP) -->
  <picture>
    <source srcset="images/kampala-small.webp" media="(max-width: 500px)">
    <source srcset="images/kampala-medium.webp" media="(max-width: 1000px)">
    <img src="images/kampala-city.jpg" alt="Kampala city view">
  </picture>

  <!-- ABOUT -->
  <section>
    <h2>About</h2>
    <p>Kampala is the capital city of Uganda, known for its hills, culture, and vibrant life.</p>
  </section>

  <!-- WEATHER -->
  <section class="weather">
    <h2>Weather</h2>
    <img src="images/weather.avifg" alt="weather icon" class="weather-icon">
    <p>Temperature: <span id="temp">45</span>°F</p>
    <p>Wind Speed: <span id="wind">5</span> mph</p>
    <p>Wind Chill: <span id="windchill"></span></p>
  </section>

</main>

<footer>
  <p>&copy; <span id="year"></span></p>
  <p>Last Modified: <span id="lastModified"></span></p>
</footer>

</body>
</html>
