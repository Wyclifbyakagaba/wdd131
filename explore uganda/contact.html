<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Explore Uganda</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Explore Uganda</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="attractions.html">Attractions</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="references.html">References</a></li>
            </ul>
        </nav>
    </header>

    <section class="content">
        <h2>Tourist Feedback Form</h2>
        <form id="touristForm">
            <label for="product">Which product are you interested in?</label>
            <select id="product" name="product" required>
                <option value="">Select a Product ...</option>
                <option value="safari">Safari</option>
                <option value="cultural">Cultural Tours</option>
                <option value="adventure">Adventure Sports</option>
            </select>

            <fieldset>
                <legend>Rate your interest in the following activities:</legend>
                <label><input type="checkbox" name="activity" value="Safari"> Safari</label>
                <label><input type="checkbox" name="activity" value="Hiking"> Hiking</label>
                <label><input type="checkbox" name="activity" value="Cultural Tours"> Cultural Tours</label>
                <label><input type="checkbox" name="activity" value="Beach"> Beach</label>
                <label><input type="checkbox" name="activity" value="Adventure Sports"> Adventure Sports</label>
            </fieldset>

            <label for="date">Planned date of visit:</label>
            <input type="date" id="date" name="date" required>

            <fieldset>
                <legend>Which of these services are you interested in?</legend>
                <label><input type="checkbox" name="service" value="Tour Guide"> Tour Guide</label>
                <label><input type="checkbox" name="service" value="Transport"> Transport</label>
                <label><input type="checkbox" name="service" value="Accommodation"> Accommodation</label>
                <label><input type="checkbox" name="service" value="Meals"> Meals</label>
            </fieldset>

            <label for="comments">Additional comments:</label>
            <textarea id="comments" name="comments" rows="4"></textarea>

            <button type="submit">Submit</button>
        </form>
    </section>

    <footer>
        <p>© 2026 | Explore Uganda | Byakagaba Wycliff</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
