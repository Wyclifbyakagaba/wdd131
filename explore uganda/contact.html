<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header>
  <h1>Tourist Feedback</h1>
</header>

<main>

<form id="feedbackForm">

<label for="product">Product</label>
<select id="product" name="product" required>
  <option value="">Select a Product...</option>
  <option>Safari</option>
  <option>Hiking</option>
  <option>City Tour</option>
</select>

<p>Activities:</p>
<label><input type="checkbox" value="Safari"> Safari</label>
<label><input type="checkbox" value="Hiking"> Hiking</label>
<label><input type="checkbox" value="Culture"> Cultural Tours</label>
<label><input type="checkbox" value="Beach"> Beach</label>

<label for="date">Visit Date</label>
<input type="date" id="date" required>

<p>Services:</p>
<label><input type="checkbox" value="Guide"> Tour Guide</label>
<label><input type="checkbox" value="Transport"> Transport</label>

<label for="comments">Comments</label>
<textarea id="comments"></textarea>

<button type="submit">Submit</button>

</form>

<p id="message"></p>

</main>

<footer>
  <p>© 2026 | Explore Uganda</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
